<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Vault — Captain</title>
<link rel="stylesheet" href="shared.css">
<style>
body {
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 32px;
}
.vault-card {
  background: var(--glass-bg);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  border: 1px solid var(--glass-border);
  box-shadow: inset 0 1px 0 oklch(100% 0 0 / 0.20), var(--shadow-lg);
  border-radius: var(--radius-lg);
  padding: 40px 48px;
  max-width: 420px;
  width: 100%;
  animation: fade-up 280ms var(--ease-out) both;
}
.vault-card h1 { font-size: var(--text-lg); font-weight: 600; margin: 0 0 6px; letter-spacing: -0.01em; }
.vault-card > p { font-size: var(--text-sm); color: var(--color-text-muted); margin: 0 0 24px; }

.vault-icon {
  display: flex; align-items: center; justify-content: center;
  width: 44px; height: 44px;
  background: var(--color-accent-dim);
  border-radius: var(--radius-base);
  color: var(--color-accent);
  font-size: 20px;
  margin-bottom: 20px;
}
.unlock-row {
  display: flex; gap: 8px; margin-bottom: 16px;
}
.unlock-row input { flex: 1; }
#vault-status { margin-top: 8px; }

/* Entry list */
#vault-entries { margin-top: 24px; }
.vault-entry {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--color-border);
}
.vault-entry:last-child { border-bottom: none; }
.vault-entry-icon {
  width: 32px; height: 32px;
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-base);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; flex-shrink: 0;
}
.vault-entry-main { flex: 1; min-width: 0; }
.vault-entry-title { font-size: var(--text-sm); font-weight: 500; }
.vault-entry-user  { font-size: var(--text-xs); color: var(--color-text-muted); font-family: var(--font-mono); }
.vault-entry-copy  {
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  border: 1px solid var(--color-border); border-radius: var(--radius-base);
  background: none; cursor: pointer; color: var(--color-text-muted);
  font-size: 12px; flex-shrink: 0;
  transition: color var(--dur-fast) var(--ease-out), border-color var(--dur-fast) var(--ease-out);
}
.vault-entry-copy:hover { color: var(--color-accent); border-color: var(--color-accent); }

/* Locked state */
#vault-locked   { display: block; }
#vault-unlocked { display: none; }
</style>
</head>
<body>
<div class="vault-card">
  <!-- Locked view -->
  <div id="vault-locked">
    <div class="vault-icon">🔐</div>
    <h1>Vault</h1>
    <p>Enter your master password to unlock your credentials.</p>
    <div class="unlock-row">
      <input type="password" id="vault-pw" placeholder="Master password" autocomplete="current-password">
      <button class="btn btn-primary" id="vault-unlock">Unlock</button>
    </div>
    <div id="vault-no-file" style="display:none;margin-bottom:12px">
      <button class="btn btn-outline" id="vault-pick-file" style="width:100%">Open .kdbx file…</button>
    </div>
    <div class="status-bar" id="vault-status"></div>
  </div>

  <!-- Unlocked view -->
  <div id="vault-unlocked">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div class="vault-icon" style="margin-bottom:0">🔓</div>
      <button class="btn btn-outline btn-sm" id="vault-lock">Lock</button>
    </div>
    <h1>Vault</h1>
    <div style="margin-bottom:12px">
      <input type="text" id="vault-search" placeholder="Search credentials…">
    </div>
    <div id="vault-entries"></div>
    <div class="status-bar" id="vault-status2"></div>
  </div>
</div>
<script src="vault.js"></script>
</body>
</html>
