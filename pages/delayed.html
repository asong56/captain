<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Loading… — Nexus</title>
<link rel="stylesheet" href="shared.css">
<style>
  :root { --accent: #f59e0b }
  .countdown      { font-size:64px; font-weight:800; color:var(--accent); font-variant-numeric:tabular-nums; letter-spacing:-.02em }
  .progress-track { width:280px; height:6px; background:var(--surface); border-radius:3px; overflow:hidden }
  .progress-bar   { height:100%; background:var(--accent); border-radius:3px; transition:width .95s linear }
</style>
</head>
<body>
<div class="icon">⏳</div>
<h1>Hold on…</h1>
<p id="delay-msg">You can access this site after a short delay.</p>
<div class="countdown" id="countdown">60</div>
<div class="progress-track"><div class="progress-bar" id="progress-bar" style="width:100%"></div></div>
<div class="actions">
  <button class="btn btn-outline" id="btn-cancel">Cancel</button>
</div>
<script src="delayed.js"></script>
</body>
</html>
