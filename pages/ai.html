<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI — Captain</title>
<link rel="stylesheet" href="shared.css">
<style>
body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

/* ACDN std-thin glass header */
#app-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 20px;
  border-bottom: 1px solid var(--glass-border);
  background: var(--glass-bg);
  backdrop-filter: blur(20px) saturate(160%);
  -webkit-backdrop-filter: blur(20px) saturate(160%);
  flex-shrink: 0;
}
#app-header h1 {
  font-size: var(--text-base);
  font-weight: 600;
  flex: 1;
  margin: 0;
  letter-spacing: -0.01em;
}
.helm-icon { width: 20px; height: 20px; color: var(--color-accent); }

#model-badge {
  font-size: var(--text-xs);
  font-weight: 600;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  border: 1px solid var(--color-border);
  color: var(--color-text-muted);
  padding: 3px 10px;
  border-radius: var(--radius-pill); /* ACDN: pill for ≤50px elements */
  cursor: pointer;
  transition: border-color var(--dur-fast) var(--ease-out), color var(--dur-fast) var(--ease-out);
}
#model-badge:hover { border-color: var(--color-accent); color: var(--color-accent); }

.header-btn {
  font-size: var(--text-xs);
  color: var(--color-text-muted);
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: var(--radius-base);
  font-family: var(--font-sans);
  transition: color var(--dur-fast) var(--ease-out), background var(--dur-fast) var(--ease-out);
}
.header-btn:hover { background: var(--color-surface); color: oklch(45% 0.18 15); }

/* Messages */
#messages {
  flex: 1;
  overflow-y: auto;
  padding: 24px 20px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  /* ACDN invisible scrollbar */
  scrollbar-width: thin;
  scrollbar-color: transparent transparent;
}
#messages:hover { scrollbar-color: var(--color-border) transparent; }

/* ACDN empty state — centered, breathable */
#empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  color: var(--color-text-muted);
  text-align: center;
  padding: 48px;
}
#empty-state .empty-icon {
  width: 44px; height: 44px;
  color: var(--color-accent);
  opacity: 0.5;
  margin-bottom: 4px;
}
#empty-state h2 { font-size: var(--text-lg); font-weight: 600; color: var(--color-text); margin: 0; }
#empty-state p { font-size: var(--text-sm); margin: 0; max-width: 280px; line-height: 1.6; }

/* Message bubbles */
.msg { display: flex; gap: 10px; align-items: flex-start; max-width: 100%; }
.msg.user { flex-direction: row-reverse; }

.avatar {
  width: 26px; height: 26px;
  border-radius: 50%;
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
  flex-shrink: 0;
  margin-top: 2px;
}
.msg.user .avatar { background: var(--color-accent-dim); border-color: var(--color-accent); }

.bubble {
  max-width: 72%;
  padding: 10px 14px;
  font-size: var(--text-sm);
  line-height: 1.65;
  white-space: pre-wrap;
  word-break: break-word;
}
.msg.user .bubble {
  background: var(--color-accent);
  color: oklch(99% 0 0);
  border-radius: 12px 12px 3px 12px;
}
.msg.assistant .bubble {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  color: var(--color-text);
  border-radius: 3px 12px 12px 12px;
}
/* ACDN: inset ring instead of border on "cards" */
.msg.assistant .bubble { box-shadow: inset 0 0 0 1px var(--color-border); border: none; }
.bubble.streaming { opacity: 0.65; }

/* Input row — ACDN search form pattern */
#input-row {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  padding: 12px 20px 16px;
  border-top: 1px solid var(--color-border);
  background: var(--glass-bg);
  backdrop-filter: blur(20px) saturate(160%);
  -webkit-backdrop-filter: blur(20px) saturate(160%);
  flex-shrink: 0;
}
#user-input {
  flex: 1;
  background: var(--color-bg);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  padding: 10px 14px;
  font-size: var(--text-sm);
  font-family: var(--font-sans);
  color: var(--color-text);
  resize: none;
  outline: none;
  max-height: 160px;
  min-height: 42px;
  line-height: 1.5;
  transition: border-color var(--dur-fast) var(--ease-out), box-shadow var(--dur-fast) var(--ease-out);
  caret-color: var(--color-accent);
}
#user-input:focus { border-color: var(--color-accent); box-shadow: 0 0 0 3px var(--color-accent-dim); }
#user-input::placeholder { color: var(--color-text-muted); opacity: 0.55; }

#send-btn {
  background: var(--color-accent);
  color: oklch(99% 0 0);
  border: none;
  border-radius: var(--radius-pill); /* ACDN primary button = pill */
  padding: 10px 16px;
  font-size: var(--text-sm);
  font-weight: 600;
  font-family: var(--font-sans);
  cursor: pointer;
  align-self: flex-end;
  transition:
    background var(--dur-fast) var(--ease-out),
    transform  var(--dur-instant) var(--ease-snap),
    opacity    var(--dur-fast) var(--ease-out);
  letter-spacing: 0.01em;
}
#send-btn:hover:not(:disabled) { background: oklch(47% 0.18 220); }
#send-btn:active { transform: scale(0.97); }
#send-btn:disabled { opacity: 0.45; cursor: not-allowed; }
</style>
</head>
<body>
<header id="app-header">
  <svg class="helm-icon" viewBox="0 0 32 32" fill="none" aria-hidden="true">
    <circle cx="16" cy="16" r="13.5" stroke="currentColor" stroke-width="1.5"/>
    <g stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
      <line x1="16" y1="12.5" x2="16" y2="4"/>
      <line x1="16" y1="19.5" x2="16" y2="28"/>
      <line x1="19.5" y1="16" x2="28" y2="16"/>
      <line x1="12.5" y1="16" x2="4"  y2="16"/>
      <line x1="18.3" y1="13.7" x2="24.5" y2="7.5"/>
      <line x1="13.7" y1="18.3" x2="7.5"  y2="24.5"/>
      <line x1="13.7" y1="13.7" x2="7.5"  y2="7.5"/>
      <line x1="18.3" y1="18.3" x2="24.5" y2="24.5"/>
    </g>
    <circle cx="16" cy="16" r="3" fill="currentColor"/>
    <circle cx="16" cy="2.5"   r="1.8" fill="currentColor"/>
    <circle cx="16" cy="29.5"  r="1.8" fill="currentColor"/>
    <circle cx="29.5" cy="16"  r="1.8" fill="currentColor"/>
    <circle cx="2.5"  cy="16"  r="1.8" fill="currentColor"/>
    <circle cx="26.2" cy="5.8"  r="1.8" fill="currentColor"/>
    <circle cx="5.8"  cy="26.2" r="1.8" fill="currentColor"/>
    <circle cx="5.8"  cy="5.8"  r="1.8" fill="currentColor"/>
    <circle cx="26.2" cy="26.2" r="1.8" fill="currentColor"/>
  </svg>
  <h1>AI</h1>
  <span id="model-badge" title="Click to change model in Settings">No model</span>
  <button class="header-btn" id="clear-btn">Clear</button>
</header>

<div id="messages">
  <div id="empty-state">
    <svg class="empty-icon" viewBox="0 0 44 44" fill="none">
      <circle cx="22" cy="22" r="19.5" stroke="currentColor" stroke-width="1.5"/>
      <g stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <line x1="22" y1="17" x2="22" y2="5.5"/>
        <line x1="22" y1="27" x2="22" y2="38.5"/>
        <line x1="27" y1="22" x2="38.5" y2="22"/>
        <line x1="17" y1="22" x2="5.5"  y2="22"/>
        <line x1="25.2" y1="18.8" x2="33.8" y2="10.2"/>
        <line x1="18.8" y1="25.2" x2="10.2" y2="33.8"/>
        <line x1="18.8" y1="18.8" x2="10.2" y2="10.2"/>
        <line x1="25.2" y1="25.2" x2="33.8" y2="33.8"/>
      </g>
      <circle cx="22" cy="22" r="4" fill="currentColor"/>
    </svg>
    <h2>Captain AI</h2>
    <p>Ask anything. Your model, your machine, your data.</p>
  </div>
</div>

<div id="input-row">
  <textarea id="user-input" placeholder="Ask something…" rows="1" aria-label="Message"></textarea>
  <button id="send-btn" disabled>Send</button>
</div>

<script src="ai.js"></script>
</body>
</html>
