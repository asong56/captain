<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Blocked — Captain</title>
<link rel="stylesheet" href="shared.css">
<style>
body {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px;
  gap: 0;
}
.block-card {
  background: var(--glass-bg);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  border: 1px solid var(--glass-border);
  box-shadow:
    inset 0 1px 0 oklch(100% 0 0 / 0.20),
    var(--shadow-lg);
  border-radius: var(--radius-lg);
  padding: 40px 48px;
  max-width: 480px;
  width: 100%;
  text-align: center;
  animation: fade-up 280ms var(--ease-out) both;
}
.block-icon {
  font-size: 32px;
  margin-bottom: 16px;
  display: block;
  opacity: 0.6;
}
.block-card h1 {
  font-size: var(--text-lg);
  font-weight: 600;
  margin: 0 0 8px;
  letter-spacing: -0.01em;
}
.block-card p {
  font-size: var(--text-sm);
  color: var(--color-text-muted);
  margin: 0 0 24px;
  line-height: 1.6;
}
.block-url {
  font-family: var(--font-mono);
  font-size: var(--text-xs);
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-base);
  padding: 8px 12px;
  margin-bottom: 24px;
  word-break: break-all;
  color: var(--color-text-muted);
  text-align: left;
}
.actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
#set-name { font-size: var(--text-base); font-weight: 600; color: var(--color-accent); }
</style>
</head>
<body>
<div class="block-card">
  <span class="block-icon">⊘</span>
  <h1>Blocked by <span id="set-name">Focus</span></h1>
  <p>This site is off-limits during your current focus session.</p>
  <div class="block-url" id="blocked-url"></div>
  <div class="actions">
    <button class="btn btn-outline" onclick="history.back()">← Go back</button>
    <button class="btn btn-primary" id="proceed-btn" style="display:none">Allow once</button>
  </div>
</div>
<script src="blocked.js"></script>
</body>
</html>
