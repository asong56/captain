<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Site Blocked — Nexus</title>
<link rel="stylesheet" href="shared.css">
<style>
  :root { --accent: #e04; }
  .url      { font-size:13px; color:var(--sub); word-break:break-all; margin-top:-8px }
  .set-name { font-size:12px; color:var(--sub) }
</style>
</head>
<body>
<div class="icon">🚫</div>
<h1>Site Blocked</h1>
<p id="custom-msg">This site is blocked by Focus Guard.</p>
<p class="url" id="blocked-url"></p>
<p class="set-name" id="set-name"></p>
<div class="actions">
  <button class="btn btn-primary" id="btn-back">← Go Back</button>
  <button class="btn btn-outline"  id="btn-close">Close Tab</button>
  <button class="btn btn-outline"  id="btn-options">Settings</button>
</div>
<script src="blocked.js"></script>
</body>
</html>
